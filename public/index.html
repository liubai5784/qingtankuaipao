<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>轻坦快跑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }
        #gameContainer {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; height: 100dvh;
        }
        canvas {
            display: block; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: auto;
        }
        #uiCanvas { z-index: 10; pointer-events: none; }

        #debugPanel {
            position: fixed; bottom: 8px; left: 8px;
            background: rgba(0,0,0,0.85); color: #0f0;
            font-size: 10px; padding: 6px 10px; border-radius: 4px;
            z-index: 9999; max-width: 60vw; max-height: 100px;
            overflow-y: auto; pointer-events: auto; line-height: 1.4; opacity: 0.9;
        }
        #jumpBtn {
            position: fixed; bottom: 50px; right: 40px;
            width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            border: 3px solid rgba(255,255,255,0.5);
            color: #fff; font-size: 22px; font-weight: bold;
            z-index: 9998; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #jumpBtn:active { background: rgba(255,255,255,0.5); }
        #crouchBtn {
            position: fixed; bottom: 50px; right: 160px;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff; font-size: 16px; font-weight: bold;
            z-index: 9998; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #crouchBtn:active { background: rgba(255,255,255,0.4); }
        #skillBtn {
            position: fixed; bottom: 50px; left: 40px;
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(255,215,0,0.2);
            border: 2px solid rgba(255,215,0,0.5);
            color: #FFD700; font-size: 14px; font-weight: bold;
            z-index: 9998; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #skillBtn:active { background: rgba(255,215,0,0.5); }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>
</div>
<div id="debugPanel">⏳ 启动中...</div>
<button id="skillBtn">主防</button>
<button id="crouchBtn">蹲</button>
<button id="jumpBtn">跳</button>

<script>
(function() {
    'use strict';

    // ==================== 调试 ====================
    var debugEl = document.getElementById('debugPanel');
    var debugLines = [];
    function debug(msg, isError) {
        debugLines.push((isError ? '❌ ' : '') + msg);
        if (debugLines.length > 20) debugLines.shift();
        debugEl.innerHTML = debugLines.join('<br>');
    }
    window.onerror = function(msg, source, line) {
        debug('JS错误: ' + msg + ' (行' + line + ')', true);
        return false;
    };

    // ==================== 画布：1920x1080 与背景完全匹配 ====================
    var gameCanvas = document.getElementById('gameCanvas');
    var uiCanvas = document.getElementById('uiCanvas');
    var ctx = gameCanvas.getContext('2d');
    var uiCtx = uiCanvas.getContext('2d');

    var WIDTH = 1920;
    var HEIGHT = 1080;
    gameCanvas.width = WIDTH;
    gameCanvas.height = HEIGHT;
    uiCanvas.width = WIDTH;
    uiCanvas.height = HEIGHT;

    // ==================== 图片加载 ====================
    var imageList = [
        { name: 'tank_normal_ready',  ext: 'png' },
        { name: 'tank_normal_active', ext: 'jpg' },
        { name: 'tank_normal_cd',     ext: 'jpg' },
        { name: 'tank_crouch_ready',  ext: 'jpg' },
        { name: 'tank_crouch_active', ext: 'jpg' },
        { name: 'tank_crouch_cd',     ext: 'jpg' },
        { name: 'obstacle_ground',    ext: 'png' },
        { name: 'obstacle_air',       ext: 'jpg' },
        { name: 'weld_torch',         ext: 'png' },
        { name: 'bg',                 ext: 'jpg' },
        { name: 'ground',             ext: 'png' }
    ];

    var images = {};
    var loaded = 0;
    var totalImages = imageList.length;

    for (var i = 0; i < imageList.length; i++) {
        var item = imageList[i];
        var img = new Image();
        images[item.name] = img;
        img.onload = (function(name, ext) {
            return function() {
                loaded++;
                debug('OK: ' + name + '.' + ext + ' (' + loaded + '/' + totalImages + ')');
            };
        })(item.name, item.ext);
        img.onerror = (function(name, ext) {
            return function() {
                loaded++;
                debug('FAIL: ' + name + '.' + ext, true);
            };
        })(item.name, item.ext);
        img.src = '/assets/' + item.name + '.' + item.ext;
    }
    debug('加载 ' + totalImages + ' 张图片');

    // ==================== 游戏元素尺寸（根据原图比例设定） ====================
    // 正常坦克 2542x1071 → 游戏中设为宽160，高按比例=67
    var TANK_W = 160;
    var TANK_H = Math.round(TANK_W * (1071 / 2542)); // ≈67

    // 压扁坦克 2542x539 → 宽同上160，高按比例=34
    var TANK_CROUCH_H = Math.round(TANK_W * (539 / 2542)); // ≈34

    // 地面障碍 566x435 → 宽60，高按比例=46
    var OBS_G_W = 60;
    var OBS_G_H = Math.round(OBS_G_W * (435 / 566)); // ≈46

    // 空中障碍 1251x1229 → 宽100，高按比例=98
    var OBS_A_W = 100;
    var OBS_A_H = Math.round(OBS_A_W * (1229 / 1251)); // ≈98

    // 焊枪 537x351 → 宽55，高按比例=36
    var PICKUP_W = 55;
    var PICKUP_H = Math.round(PICKUP_W * (351 / 537)); // ≈36

    // 地面图 2732x1534 → 高度设为120，宽度铺满
    var GROUND_H = 120;
    var GROUND_Y = HEIGHT - GROUND_H;

    debug('坦克: ' + TANK_W + 'x' + TANK_H + ' 压扁: ' + TANK_CROUCH_H);
    debug('地面障碍: ' + OBS_G_W + 'x' + OBS_G_H + ' 空中: ' + OBS_A_W + 'x' + OBS_A_H);
    debug('地面Y: ' + GROUND_Y + ' 地面高: ' + GROUND_H);

    // ==================== 坦克 ====================
    var tank = {
        x: 180,
        y: GROUND_Y - TANK_H,
        w: TANK_W,
        h: TANK_H,
        vy: 0,
        jumping: false,
        crouching: false,
        hp: 100,
        maxHp: 100,
        skillActive: false,
        skillTimer: 0,
        skillDuration: 10 * 60,
        skillCooldown: 30 * 60,
        skillCooldownTimer: 0,
        invincibleTimer: 0,
        invincibleDuration: 25
    };

    var GRAVITY = 1.1;
    var JUMP_FORCE = -20;

    // ==================== 障碍物 & 道具 ====================
    var obstacles = [];
    var obstacleTimer = 0;
    var obstacleInterval = 100;
    var pickups = [];
    var pickupTimer = 0;
    var pickupInterval = 240;
    var frameCount = 0;
    var score = 0;
    var gameSpeed = 10;
    var gameOver = false;
    var gameStarted = false;

    // ==================== 跳跃 ====================
    function doJump() {
        if (tank.jumping || tank.crouching) return;
        tank.vy = JUMP_FORCE;
        tank.jumping = true;
    }

    function activateSkill() {
        if (tank.skillActive || tank.skillCooldownTimer > 0) return;
        tank.skillActive = true;
        tank.skillTimer = tank.skillDuration;
    }

    // ==================== 键盘 ====================
    document.addEventListener('keydown', function(e) {
        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) {
            if (e.code === 'Space' || e.code === 'ArrowUp') restartGame();
            return;
        }
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            e.preventDefault(); doJump();
        }
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            e.preventDefault(); tank.crouching = true;
        }
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
            e.preventDefault(); activateSkill();
        }
    });
    document.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowDown' || e.code === 'KeyS') tank.crouching = false;
    });

    // ==================== 按钮 ====================
    document.getElementById('jumpBtn').addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) { restartGame(); return; }
        doJump();
    });
    var crouchBtn = document.getElementById('crouchBtn');
    crouchBtn.addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted || gameOver) return;
        tank.crouching = true;
    });
    crouchBtn.addEventListener('pointerup', function(e) { e.preventDefault(); tank.crouching = false; });
    crouchBtn.addEventListener('pointerleave', function() { tank.crouching = false; });
    document.getElementById('skillBtn').addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted || gameOver) return;
        activateSkill();
    });
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) { restartGame(); return; }
        doJump();
    });

    // ==================== 碰撞 ====================
    function rectCollide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function getTankImage() {
        var c = tank.crouching;
        if (tank.skillActive) return images[c ? 'tank_crouch_active' : 'tank_normal_active'];
        if (tank.skillCooldownTimer > 0) return images[c ? 'tank_crouch_cd' : 'tank_normal_cd'];
        return images[c ? 'tank_crouch_ready' : 'tank_normal_ready'];
    }

    function getTankHeight() {
        return tank.crouching ? TANK_CROUCH_H : TANK_H;
    }

    // ==================== 更新 ====================
    function update() {
        if (!gameStarted || gameOver) return;

        frameCount++; score++;
        gameSpeed = 10 + Math.floor(score / 500);
        obstacleInterval = Math.max(45, 100 - Math.floor(score / 300));
        pickupInterval = Math.max(100, 240 - Math.floor(score / 400));

        tank.vy += GRAVITY;
        tank.y += tank.vy;
        var h = getTankHeight();
        var floorY = GROUND_Y - h;
        if (tank.y >= floorY) {
            tank.y = floorY;
            tank.vy = 0;
            tank.jumping = false;
        }

        if (tank.skillActive) {
            tank.skillTimer--;
            if (tank.skillTimer <= 0) {
                tank.skillActive = false;
                tank.skillCooldownTimer = tank.skillCooldown;
            }
        }
        if (tank.skillCooldownTimer > 0) tank.skillCooldownTimer--;
        if (tank.invincibleTimer > 0) tank.invincibleTimer--;

        obstacleTimer++;
        if (obstacleTimer >= obstacleInterval) {
            obstacleTimer = 0;
            var isAir = Math.random() < 0.45;
            obstacles.push({
                x: WIDTH,
                y: isAir ? GROUND_Y - OBS_A_H - 40 : GROUND_Y - OBS_G_H,
                w: isAir ? OBS_A_W : OBS_G_W,
                h: isAir ? OBS_A_H : OBS_G_H,
                type: isAir ? 'air' : 'ground'
            });
        }

        pickupTimer++;
        if (pickupTimer >= pickupInterval) {
            pickupTimer = 0;
            if (Math.random() < 0.6) {
                pickups.push({
                    x: WIDTH,
                    y: GROUND_Y - PICKUP_H - 10,
                    w: PICKUP_W,
                    h: PICKUP_H
                });
            }
        }

        for (var i = 0; i < obstacles.length; i++) obstacles[i].x -= gameSpeed;
        obstacles = obstacles.filter(function(o) { return o.x > -120; });
        for (var i = 0; i < pickups.length; i++) pickups[i].x -= gameSpeed;
        pickups = pickups.filter(function(p) { return p.x > -80; });

        var tr = { x: tank.x, y: tank.y, w: TANK_W, h: getTankHeight() };
        for (var i = 0; i < obstacles.length; i++) {
            if (rectCollide(tr, obstacles[i])) {
                if (tank.skillActive || tank.invincibleTimer > 0) continue;
                tank.hp -= 25;
                tank.invincibleTimer = tank.invincibleDuration;
                obstacles[i].x = -999;
                if (tank.hp <= 0) { tank.hp = 0; gameOver = true; }
            }
        }
        for (var i = 0; i < pickups.length; i++) {
            if (rectCollide(tr, pickups[i])) {
                if (tank.hp < tank.maxHp) tank.hp = Math.min(tank.maxHp, tank.hp + 25);
                pickups[i].x = -999;
            }
        }
        obstacles = obstacles.filter(function(o) { return o.x !== -999; });
        pickups = pickups.filter(function(p) { return p.x !== -999; });
    }

    // ==================== 绘制 ====================
    function drawBackground() {
        // 背景 1920x1080 原图铺满
        var bg = images['bg'];
        if (bg && bg.complete && bg.naturalWidth > 0) {
            ctx.drawImage(bg, 0, 0, WIDTH, HEIGHT);
        } else {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, WIDTH, GROUND_Y);
        }

        // 地面图宽度铺满，高度为 GROUND_H
        var g = images['ground'];
        if (g && g.complete && g.naturalWidth > 0) {
            ctx.drawImage(g, 0, GROUND_Y, WIDTH, GROUND_H);
        } else {
            ctx.fillStyle = '#8B7355'; ctx.fillRect(0, GROUND_Y, WIDTH, GROUND_H);
        }
    }

    function drawTank() {
        var img = getTankImage();
        var h = getTankHeight();
        tank.h = h;
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, tank.x, tank.y, TANK_W, h);
        } else {
            ctx.fillStyle = '#4CAF50'; ctx.fillRect(tank.x, tank.y, TANK_W, h);
        }
    }

    function drawObstacles() {
        for (var i = 0; i < obstacles.length; i++) {
            var o = obstacles[i];
            var img = images[o.type === 'air' ? 'obstacle_air' : 'obstacle_ground'];
            if (img && img.complete && img.naturalWidth > 0) {
                // 空中障碍：以宽度为基准等比例绘制
                if (o.type === 'air') {
                    ctx.drawImage(img, o.x, o.y, OBS_A_W, OBS_A_H);
                } else {
                    ctx.drawImage(img, o.x, o.y, OBS_G_W, OBS_G_H);
                }
            } else {
                ctx.fillStyle = o.type === 'air' ? '#FF4444' : '#333';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }
        }
    }

    function drawPickups() {
        var img = images['weld_torch'];
        for (var i = 0; i < pickups.length; i++) {
            var p = pickups[i];
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.drawImage(img, p.x, p.y, PICKUP_W, PICKUP_H);
            } else {
                ctx.fillStyle = '#FFD700'; ctx.fillRect(p.x, p.y, PICKUP_W, PICKUP_H);
            }
        }
    }

    function drawUI() {
        uiCtx.clearRect(0, 0, WIDTH, HEIGHT);

        // HP条
        var bx = 40, by = 40, bw = 400, bh = 36;
        uiCtx.fillStyle = '#333'; uiCtx.fillRect(bx, by, bw, bh);
        var r = tank.hp / tank.maxHp;
        uiCtx.fillStyle = r > 0.5 ? '#4CAF50' : (r > 0.25 ? '#FF9800' : '#F44336');
        uiCtx.fillRect(bx, by, bw * r, bh);
        uiCtx.strokeStyle = '#fff'; uiCtx.lineWidth = 3; uiCtx.strokeRect(bx, by, bw, bh);
        uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 24px "Courier New"'; uiCtx.textAlign = 'center';
        uiCtx.fillText('HP: ' + tank.hp + '/' + tank.maxHp, bx + bw/2, by + 26);

        // 技能条
        var sx = 40, sy = 90, sw = 400, sh = 20;
        uiCtx.fillStyle = '#222'; uiCtx.fillRect(sx, sy, sw, sh);
        if (tank.skillActive) {
            uiCtx.fillStyle = '#FFD700';
            uiCtx.fillRect(sx, sy, sw * (tank.skillTimer/tank.skillDuration), sh);
            uiCtx.fillStyle = '#fff'; uiCtx.font = '18px "Courier New"';
            uiCtx.fillText('主防开启', sx+sw/2, sy-6);
        } else if (tank.skillCooldownTimer > 0) {
            uiCtx.fillStyle = '#666';
            uiCtx.fillRect(sx, sy, sw * (tank.skillCooldownTimer/tank.skillCooldown), sh);
            uiCtx.fillStyle = '#aaa'; uiCtx.font = '18px "Courier New"';
            uiCtx.fillText('主防CD: ' + Math.ceil(tank.skillCooldownTimer/60) + 's', sx+sw/2, sy-6);
        } else {
            uiCtx.fillStyle = '#4CAF50'; uiCtx.fillRect(sx, sy, sw, sh);
            uiCtx.fillStyle = '#fff'; uiCtx.font = '18px "Courier New"';
            uiCtx.fillText('主防就绪 [Shift]', sx+sw/2, sy-6);
        }

        // 分数
        uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 44px "Courier New"'; uiCtx.textAlign = 'right';
        uiCtx.fillText('' + Math.floor(score/10), WIDTH-40, 70);

        if (gameOver) {
            uiCtx.fillStyle = 'rgba(0,0,0,0.7)'; uiCtx.fillRect(0, HEIGHT/2-100, WIDTH, 200);
            uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 60px "Courier New"'; uiCtx.textAlign = 'center';
            uiCtx.fillText('坦克损毁', WIDTH/2, HEIGHT/2-20);
            uiCtx.font = '30px "Courier New"';
            uiCtx.fillText('按空格/点击屏幕重新出发', WIDTH/2, HEIGHT/2+50);
        } else if (!gameStarted) {
            uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 40px "Courier New"'; uiCtx.textAlign = 'center';
            uiCtx.fillText('按空格/点击屏幕开始', WIDTH/2, HEIGHT/2);
            uiCtx.font = '24px "Courier New"';
            uiCtx.fillText('跳跃: 空格/↑/W/按钮 | 下蹲: ↓/S/按钮 | 主防: Shift/按钮', WIDTH/2, HEIGHT/2+50);
        }
    }

    // ==================== 主循环 ====================
    function gameLoop() {
        update();
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        drawBackground();
        drawPickups();
        drawObstacles();
        drawTank();
        drawUI();
        requestAnimationFrame(gameLoop);
    }

    function restartGame() {
        tank.y = GROUND_Y - TANK_H;
        tank.h = TANK_H;
        tank.vy = 0;
        tank.jumping = false;
        tank.crouching = false;
        tank.hp = tank.maxHp;
        tank.skillActive = false;
        tank.skillTimer = 0;
        tank.skillCooldownTimer = 0;
        tank.invincibleTimer = 0;
        obstacles = [];
        pickups = [];
        obstacleTimer = 0;
        pickupTimer = 0;
        frameCount = 0;
        score = 0;
        gameSpeed = 10;
        gameOver = false;
        gameStarted = false;
    }

    function startWhenReady() {
        if (loaded >= totalImages) {
            debug('🎮 启动！' + WIDTH + 'x' + HEIGHT + ' 背景原图不压缩');
            gameLoop();
        } else {
            setTimeout(startWhenReady, 200);
        }
    }
    startWhenReady();
})();
</script>
</body>
</html>
