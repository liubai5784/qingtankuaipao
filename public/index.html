<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>轻坦快跑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        #gameContainer { position: relative; width: 800px; height: 400px; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #uiCanvas { z-index: 10; pointer-events: none; }
        #debugPanel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-size: 11px;
            padding: 8px;
            border-radius: 4px;
            z-index: 999;
            max-width: 90vw;
            max-height: 120px;
            overflow-y: auto;
            pointer-events: auto;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>
</div>
<div id="debugPanel">⏳ 等待启动...</div>

<script>
// ==================== 调试面板 ====================
const debugEl = document.getElementById('debugPanel');
const debugLines = [];
function debug(msg, isError = false) {
    debugLines.push((isError ? '❌ ' : '✅ ') + msg);
    if (debugLines.length > 15) debugLines.shift();
    debugEl.innerHTML = debugLines.join('<br>');
    if (isError) console.error(msg); else console.log(msg);
}

// ==================== 原始错误捕获 ====================
window.onerror = function(msg, source, line, col, error) {
    debug('JS错误: ' + msg + ' (行' + line + ')', true);
    return false;
};

// ==================== 获取画布 ====================
try {
    const gameCanvas = document.getElementById('gameCanvas');
    const uiCanvas = document.getElementById('uiCanvas');
    const ctx = gameCanvas.getContext('2d');
    const uiCtx = uiCanvas.getContext('2d');
    debug('画布获取成功');
} catch(e) {
    debug('画布获取失败: ' + e.message, true);
}

const WIDTH = 800;
const HEIGHT = 400;
gameCanvas.width = uiCanvas.width = WIDTH;
gameCanvas.height = uiCanvas.height = HEIGHT;
const GROUND_Y = HEIGHT - 60;

// ==================== 加载素材 ====================
const imageList = [
    { name: 'tank_normal_ready',   ext: 'png' },
    { name: 'tank_normal_active',  ext: 'jpg' },
    { name: 'tank_normal_cd',      ext: 'jpg' },
    { name: 'tank_crouch_ready',   ext: 'jpg' },
    { name: 'tank_crouch_active',  ext: 'jpg' },
    { name: 'tank_crouch_cd',      ext: 'jpg' },
    { name: 'obstacle_ground',     ext: 'png' },
    { name: 'obstacle_air',        ext: 'jpg' },
    { name: 'weld_torch',          ext: 'png' },
    { name: 'bg',                  ext: 'jpg' },
    { name: 'ground',              ext: 'png' },
];

const images = {};
let loaded = 0;
const totalImages = imageList.length;

imageList.forEach(item => {
    images[item.name] = new Image();
    images[item.name].onload = () => {
        loaded++;
        debug(`图片加载: ${item.name}.${item.ext} (${loaded}/${totalImages})`);
    };
    images[item.name].onerror = () => {
        debug(`图片加载失败: ${item.name}.${item.ext}`, true);
        loaded++;
    };
    images[item.name].src = `assets/${item.name}.${item.ext}`;
});
debug(`开始加载 ${totalImages} 张图片`);

// ==================== 坦克属性 ====================
const TANK_W = 64;
const TANK_H = 44;
const TANK_CROUCH_H = 24;

const tank = {
    x: 100, y: GROUND_Y - TANK_H, w: TANK_W, h: TANK_H, vy: 0,
    jumping: false, crouching: false,
    hp: 100, maxHp: 100,
    skillActive: false, skillTimer: 0, skillDuration: 10 * 60,
    skillCooldown: 30 * 60, skillCooldownTimer: 0,
    invincibleTimer: 0, invincibleDuration: 25,
};
const GRAVITY = 0.8;
const JUMP_FORCE = -13;

// ==================== 障碍物 / 道具 ====================
const OBS_G_W = 30, OBS_G_H = 40, OBS_A_W = 50, OBS_A_H = 28;
let obstacles = [], obstacleTimer = 0, obstacleInterval = 100;
const PICKUP_W = 30, PICKUP_H = 30;
let pickups = [], pickupTimer = 0, pickupInterval = 240;
let frameCount = 0, score = 0, gameSpeed = 5;
let gameOver = false, gameStarted = false;

// ==================== 键盘 ====================
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (!gameStarted && !gameOver) gameStarted = true;
    if (gameOver && e.code === 'Space') { restartGame(); return; }
    if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && !tank.jumping && !tank.crouching) {
        tank.vy = JUMP_FORCE; tank.jumping = true;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') tank.crouching = true;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') activateSkill();
    e.preventDefault();
});
document.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'ArrowDown' || e.code === 'KeyS') tank.crouching = false;
});

function activateSkill() {
    if (tank.skillActive || tank.skillCooldownTimer > 0) return;
    tank.skillActive = true; tank.skillTimer = tank.skillDuration;
}

function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getTankImage() {
    const c = tank.crouching;
    if (tank.skillActive) return images[c ? 'tank_crouch_active' : 'tank_normal_active'];
    if (tank.skillCooldownTimer > 0) return images[c ? 'tank_crouch_cd' : 'tank_normal_cd'];
    return images[c ? 'tank_crouch_ready' : 'tank_normal_ready'];
}
function getTankHeight() { return tank.crouching ? TANK_CROUCH_H : TANK_H; }

// ==================== 更新 ====================
function update() {
    if (!gameStarted || gameOver) return;
    frameCount++; score++;
    gameSpeed = 5 + Math.floor(score / 500);
    obstacleInterval = Math.max(50, 100 - Math.floor(score / 300));
    pickupInterval = Math.max(120, 240 - Math.floor(score / 400));

    tank.vy += GRAVITY; tank.y += tank.vy;
    const h = getTankHeight();
    if (tank.y >= GROUND_Y - h) { tank.y = GROUND_Y - h; tank.vy = 0; tank.jumping = false; }

    if (tank.skillActive) { tank.skillTimer--; if (tank.skillTimer <= 0) { tank.skillActive = false; tank.skillCooldownTimer = tank.skillCooldown; } }
    if (tank.skillCooldownTimer > 0) tank.skillCooldownTimer--;
    if (tank.invincibleTimer > 0) tank.invincibleTimer--;

    obstacleTimer++;
    if (obstacleTimer >= obstacleInterval) {
        obstacleTimer = 0;
        const isAir = Math.random() < 0.45;
        obstacles.push({
            x: WIDTH,
            y: isAir ? GROUND_Y - OBS_A_H - 30 : GROUND_Y - OBS_G_H,
            w: isAir ? OBS_A_W : OBS_G_W, h: isAir ? OBS_A_H : OBS_G_H,
            type: isAir ? 'air' : 'ground',
        });
    }

    pickupTimer++;
    if (pickupTimer >= pickupInterval) {
        pickupTimer = 0;
        if (Math.random() < 0.6) pickups.push({ x: WIDTH, y: GROUND_Y - PICKUP_H - 5, w: PICKUP_W, h: PICKUP_H });
    }

    for (let o of obstacles) o.x -= gameSpeed;
    obstacles = obstacles.filter(o => o.x > -60);
    for (let p of pickups) p.x -= gameSpeed;
    pickups = pickups.filter(p => p.x > -40);

    const tr = { x: tank.x, y: tank.y, w: TANK_W, h: getTankHeight() };
    for (let o of obstacles) {
        if (rectCollide(tr, o)) {
            if (tank.skillActive || tank.invincibleTimer > 0) continue;
            tank.hp -= 25; tank.invincibleTimer = tank.invincibleDuration; o.x = -999;
            if (tank.hp <= 0) { tank.hp = 0; gameOver = true; }
        }
    }
    for (let p of pickups) {
        if (rectCollide(tr, p)) {
            if (tank.hp < tank.maxHp) tank.hp = Math.min(tank.maxHp, tank.hp + 25);
            p.x = -999;
        }
    }
    obstacles = obstacles.filter(o => o.x !== -999);
    pickups = pickups.filter(p => p.x !== -999);
}

// ==================== 绘制 ====================
function drawBackground() {
    if (images['bg'] && images['bg'].complete && images['bg'].naturalWidth > 0) {
        ctx.drawImage(images['bg'], 0, 0, WIDTH, HEIGHT);
    } else {
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, WIDTH, GROUND_Y);
    }
    if (images['ground'] && images['ground'].complete && images['ground'].naturalWidth > 0) {
        ctx.drawImage(images['ground'], 0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
    } else {
        ctx.fillStyle = '#8B7355'; ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
    }
}

function drawTank() {
    const img = getTankImage();
    const h = getTankHeight();
    tank.y = GROUND_Y - h; tank.h = h;
    if (img && img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, tank.x, tank.y, TANK_W, h);
    } else {
        ctx.fillStyle = '#4CAF50'; ctx.fillRect(tank.x, tank.y, TANK_W, h);
    }
}

function drawObstacles() {
    for (let o of obstacles) {
        const img = images[o.type === 'air' ? 'obstacle_air' : 'obstacle_ground'];
        if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, o.x, o.y, o.w, o.h);
        else { ctx.fillStyle = o.type === 'air' ? '#F44' : '#333'; ctx.fillRect(o.x, o.y, o.w, o.h); }
    }
}

function drawPickups() {
    const img = images['weld_torch'];
    for (let p of pickups) {
        if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, p.x, p.y, p.w, p.h);
        else { ctx.fillStyle = '#FFD700'; ctx.fillRect(p.x, p.y, p.w, p.h); }
    }
}

function drawUI() {
    uiCtx.clearRect(0, 0, WIDTH, HEIGHT);
    const barX = 20, barY = 20, barW = 200, barH = 18;
    uiCtx.fillStyle = '#333'; uiCtx.fillRect(barX, barY, barW, barH);
    const r = tank.hp / tank.maxHp;
    uiCtx.fillStyle = r > 0.5 ? '#4CAF50' : r > 0.25 ? '#FF9800' : '#F44336';
    uiCtx.fillRect(barX, barY, barW * r, barH);
    uiCtx.strokeStyle = '#fff'; uiCtx.lineWidth = 2; uiCtx.strokeRect(barX, barY, barW, barH);
    uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 13px "Courier New"'; uiCtx.textAlign = 'center';
    uiCtx.fillText(`HP: ${tank.hp}/${tank.maxHp}`, barX + barW/2, barY + 14);

    const sx = 20, sy = 48, sw = 200, sh = 10;
    uiCtx.fillStyle = '#222'; uiCtx.fillRect(sx, sy, sw, sh);
    if (tank.skillActive) {
        uiCtx.fillStyle = '#FFD700'; uiCtx.fillRect(sx, sy, sw * (tank.skillTimer/tank.skillDuration), sh);
        uiCtx.fillStyle = '#fff'; uiCtx.font = '10px "Courier New"'; uiCtx.fillText('主防开启', sx+sw/2, sy-4);
    } else if (tank.skillCooldownTimer > 0) {
        uiCtx.fillStyle = '#666'; uiCtx.fillRect(sx, sy, sw * (tank.skillCooldownTimer/tank.skillCooldown), sh);
        uiCtx.fillStyle = '#aaa'; uiCtx.font = '10px "Courier New"';
        uiCtx.fillText('主防CD: ' + Math.ceil(tank.skillCooldownTimer/60) + 's', sx+sw/2, sy-4);
    } else {
        uiCtx.fillStyle = '#4CAF50'; uiCtx.fillRect(sx, sy, sw, sh);
        uiCtx.fillStyle = '#fff'; uiCtx.font = '10px "Courier New"'; uiCtx.fillText('主防就绪 [Shift]', sx+sw/2, sy-4);
    }

    uiCtx.fillStyle = '#333'; uiCtx.font = 'bold 22px "Courier New"'; uiCtx.textAlign = 'right';
    uiCtx.fillText('' + Math.floor(score/10), WIDTH-20, 35);

    if (gameOver) {
        uiCtx.fillStyle = 'rgba(0,0,0,0.7)'; uiCtx.fillRect(0, HEIGHT/2-50, WIDTH, 100);
        uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 30px "Courier New"'; uiCtx.textAlign = 'center';
        uiCtx.fillText('坦克损毁', WIDTH/2, HEIGHT/2-10);
        uiCtx.font = '16px "Courier New"'; uiCtx.fillText('按空格键重新出发', WIDTH/2, HEIGHT/2+30);
    } else if (!gameStarted) {
        uiCtx.fillStyle = '#fff'; uiCtx.font = 'bold 20px "Courier New"'; uiCtx.textAlign = 'center';
        uiCtx.fillText('按空格键开始', WIDTH/2, HEIGHT/2);
        uiCtx.font = '13px "Courier New"';
        uiCtx.fillText('跳跃: 空格/↑/W | 下蹲: ↓/S | 主防: Shift', WIDTH/2, HEIGHT/2+28);
    }
}

// ==================== 主循环 ====================
function gameLoop() {
    update();
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    drawBackground();
    drawPickups();
    drawObstacles();
    drawTank();
    drawUI();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    tank.y = GROUND_Y - TANK_H; tank.h = TANK_H; tank.vy = 0;
    tank.jumping = false; tank.crouching = false;
    tank.hp = tank.maxHp; tank.skillActive = false; tank.skillTimer = 0;
    tank.skillCooldownTimer = 0; tank.invincibleTimer = 0;
    obstacles = []; pickups = [];
    obstacleTimer = 0; pickupTimer = 0;
    frameCount = 0; score = 0; gameSpeed = 5;
    gameOver = false; gameStarted = false;
}

function startWhenReady() {
    if (loaded >= totalImages) {
        debug('全部素材加载完毕，启动游戏循环');
        gameLoop();
    } else {
        setTimeout(startWhenReady, 200);
    }
}
startWhenReady();
</script>
</body>
</html>
