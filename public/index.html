<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>轻坦快跑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 竖屏提示 */
        #rotateHint {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }
        #rotateHint .icon { font-size: 64px; animation: spin 2s ease-in-out infinite; }
        #rotateHint .text { font-size: 20px; margin-top: 16px; color: #ccc; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }

        #gameContainer {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; height: 100dvh;
            display: none;
        }
        canvas {
            display: block; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: auto;
        }
        #uiCanvas { z-index: 10; pointer-events: none; }

        /* 按钮统一样式 */
        .ctrl-btn {
            position: fixed;
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s, transform 0.1s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.12);
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.92); }

        #jumpBtn  { bottom: 28px; right: 28px; }
        #crouchBtn { bottom: 28px; right: 108px; }
        #skillBtn {
            bottom: 28px; right: 188px;
            border-color: rgba(255,215,0,0.5); color: #FFD700;
            background: rgba(255,215,0,0.1);
            font-size: 12px;
        }
        #skillBtn:active { background: rgba(255,215,0,0.3); }
    </style>
</head>
<body>

<!-- 竖屏提示 -->
<div id="rotateHint">
    <div class="icon">📱</div>
    <div class="text">请将设备旋转至横屏模式，如果无法旋转请跳转至浏览器打开</div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>
</div>
<button class="ctrl-btn" id="skillBtn">主防</button>
<button class="ctrl-btn" id="crouchBtn">蹲</button>
<button class="ctrl-btn" id="jumpBtn">跳</button>

<script>
(function() {
    'use strict';

    // ==================== 横竖屏检测 ====================
    var rotateHint = document.getElementById('rotateHint');
    var gameContainer = document.getElementById('gameContainer');
    var buttons = document.querySelectorAll('.ctrl-btn');

    function checkOrientation() {
        var isLandscape = window.innerWidth > window.innerHeight;
        if (!isLandscape) {
            rotateHint.style.display = 'flex';
            gameContainer.style.display = 'none';
            buttons.forEach(function(b) { b.style.display = 'none'; });
        } else {
            rotateHint.style.display = 'none';
            gameContainer.style.display = 'block';
            buttons.forEach(function(b) { b.style.display = 'flex'; });
        }
    }

    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 200);
    });
    checkOrientation();

    // ==================== 画布（等比缩放） ====================
    var gameCanvas = document.getElementById('gameCanvas');
    var uiCanvas = document.getElementById('uiCanvas');
    var ctx = gameCanvas.getContext('2d');
    var uiCtx = uiCanvas.getContext('2d');

    // 固定 16:9 逻辑分辨率，CSS 自动适配
    var WIDTH = 1920;
    var HEIGHT = 1080;
    gameCanvas.width = WIDTH;
    gameCanvas.height = HEIGHT;
    uiCanvas.width = WIDTH;
    uiCanvas.height = HEIGHT;

    // ==================== 加载素材 ====================
    var imageList = [
        { name: 'tank_normal_ready',  ext: 'png' },
        { name: 'tank_normal_active', ext: 'jpg' },
        { name: 'tank_normal_cd',     ext: 'jpg' },
        { name: 'tank_crouch_ready',  ext: 'jpg' },
        { name: 'tank_crouch_active', ext: 'jpg' },
        { name: 'tank_crouch_cd',     ext: 'jpg' },
        { name: 'obstacle_ground',    ext: 'png' },
        { name: 'obstacle_air',       ext: 'jpg' },
        { name: 'weld_torch',         ext: 'png' },
        { name: 'bg',                 ext: 'jpg' },
        { name: 'ground',             ext: 'png' }
    ];

    var images = {};
    var loaded = 0;
    var totalImages = imageList.length;

    for (var i = 0; i < imageList.length; i++) {
        var item = imageList[i];
        var img = new Image();
        images[item.name] = img;
        img.onload = function() { loaded++; };
        img.onerror = function() { loaded++; };
        img.src = '/assets/' + item.name + '.' + item.ext;
    }

    // ==================== 元素尺寸 ====================
    var TANK_W = 240;
    var TANK_H = Math.round(TANK_W * (1071 / 2542));       // 101
    var TANK_CROUCH_H = Math.round(TANK_W * (539 / 2542)); // 51

    var OBS_G_W = 90;
    var OBS_G_H = Math.round(OBS_G_W * (435 / 566));

    var OBS_A_W = 80;
    var OBS_A_H = Math.round(OBS_A_W * (1229 / 1251));

    var PICKUP_W = 80;
    var PICKUP_H = Math.round(PICKUP_W * (351 / 537));

    var GROUND_H = 130;
    var GROUND_Y = HEIGHT - GROUND_H;

    // ==================== 坦克 ====================
    var tank = {
        x: 200,
        y: GROUND_Y - TANK_H,
        w: TANK_W, h: TANK_H,
        vy: 0,
        jumping: false, crouching: false,

        // 下蹲平滑过渡
        targetY: GROUND_Y - TANK_H,

        hp: 100, maxHp: 100,
        skillActive: false,
        skillTimer: 0, skillDuration: 10 * 60,
        skillCooldown: 30 * 60, skillCooldownTimer: 0,
        invincibleTimer: 0, invincibleDuration: 25
    };

    var GRAVITY = 0.7;
    var JUMP_FORCE = -18;

    // ==================== 障碍 & 道具 ====================
    var obstacles = [];
    var obstacleTimer = 0;
    var obstacleInterval = 170;
    var lastObstacleX = WIDTH;  // 上一个障碍的x坐标，用于间距检测

    var pickups = [];
    var pickupTimer = 0;
    var pickupInterval = 300;
    var lastPickupX = WIDTH;

    var frameCount = 0;
    var score = 0;
    var gameSpeed = 8;
    var gameOver = false;
    var gameStarted = false;

    // ==================== 动作函数 ====================
    function doJump() {
        // 空中不能再跳，但落地瞬间可以
        if (tank.jumping) return;
        // 下蹲中起跳：取消下蹲，立刻跳
        tank.crouching = false;
        tank.vy = JUMP_FORCE;
        tank.jumping = true;
    }

    function doCrouch() {
        // 空中也可以下蹲（快速下落）
        if (tank.crouching) return;
        tank.crouching = true;
        // 如果在地面上，平滑过渡
        if (!tank.jumping) {
            tank.targetY = GROUND_Y - TANK_CROUCH_H;
        }
    }

    function doStand() {
        tank.crouching = false;
        if (!tank.jumping) {
            tank.targetY = GROUND_Y - TANK_H;
        }
    }

    function activateSkill() {
        if (tank.skillActive || tank.skillCooldownTimer > 0) return;
        tank.skillActive = true;
        tank.skillTimer = tank.skillDuration;
    }

    // ==================== 键盘（短按灵敏） ====================
    var spacePressed = false;
    document.addEventListener('keydown', function(e) {
        if (e.repeat) return; // 忽略键盘重复事件

        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                restartGame();
            }
            return;
        }

        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            e.preventDefault();
            if (!spacePressed) {
                spacePressed = true;
                doJump();
            }
        }
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            e.preventDefault();
            doCrouch();
        }
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
            e.preventDefault();
            activateSkill();
        }
    });

    document.addEventListener('keyup', function(e) {
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            spacePressed = false;
        }
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            doStand();
        }
    });

    // ==================== 按钮（即时响应） ====================
    document.getElementById('jumpBtn').addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) { restartGame(); return; }
        doJump();
    });

    var crouchBtn = document.getElementById('crouchBtn');
    crouchBtn.addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted || gameOver) return;
        doCrouch();
    });
    crouchBtn.addEventListener('pointerup', function(e) {
        e.preventDefault();
        doStand();
    });
    crouchBtn.addEventListener('pointerleave', function() {
        doStand();
    });
    // 触摸事件也处理
    crouchBtn.addEventListener('touchstart', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted || gameOver) return;
        doCrouch();
    });
    crouchBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        doStand();
    });

    document.getElementById('skillBtn').addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (!gameStarted || gameOver) return;
        activateSkill();
    });

    // 点击屏幕跳跃
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        if (window.innerWidth <= window.innerHeight) return; // 竖屏不响应
        if (!gameStarted && !gameOver) { gameStarted = true; return; }
        if (gameOver) { restartGame(); return; }
        doJump();
    });

    // ==================== 碰撞 ====================
    function rectCollide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function getTankImage() {
        var c = tank.crouching;
        if (tank.skillActive) return images[c ? 'tank_crouch_active' : 'tank_normal_active'];
        if (tank.skillCooldownTimer > 0) return images[c ? 'tank_crouch_cd' : 'tank_normal_cd'];
        return images[c ? 'tank_crouch_ready' : 'tank_normal_ready'];
    }

    function getTankHeight() {
        return tank.crouching ? TANK_CROUCH_H : TANK_H;
    }

    // ==================== 更新 ====================
    function update() {
        if (!gameStarted || gameOver) return;

        frameCount++; score++;
        gameSpeed = 8 + Math.floor(score / 600);
        obstacleInterval = Math.max(85, 170 - Math.floor(score / 400));
        pickupInterval = Math.max(150, 300 - Math.floor(score / 500));

        // ---- 重力 ----
        tank.vy += GRAVITY;
        tank.y += tank.vy;

        var targetH = tank.crouching ? TANK_CROUCH_H : TANK_H;
        var floorY = GROUND_Y - targetH;

        if (tank.y >= floorY) {
            tank.y = floorY;
            tank.vy = 0;
            tank.jumping = false;
        }

        // 下蹲平滑过渡（仅在地面时）
        if (!tank.jumping && tank.crouching) {
            tank.targetY = GROUND_Y - TANK_CROUCH_H;
        } else if (!tank.jumping && !tank.crouching) {
            tank.targetY = GROUND_Y - TANK_H;
        }
        if (!tank.jumping) {
            // 平滑移动到目标Y
            tank.y += (tank.targetY - tank.y) * 0.35;
        }

        // ---- 技能 ----
        if (tank.skillActive) {
            tank.skillTimer--;
            if (tank.skillTimer <= 0) {
                tank.skillActive = false;
                tank.skillCooldownTimer = tank.skillCooldown;
            }
        }
        if (tank.skillCooldownTimer > 0) tank.skillCooldownTimer--;
        if (tank.invincibleTimer > 0) tank.invincibleTimer--;

        // ---- 生成障碍（优化间距） ----
        obstacleTimer++;
        if (obstacleTimer >= obstacleInterval) {
            obstacleTimer = 0;

            // 检查上一个障碍的位置，确保间距至少 400px
            var lastObs = obstacles.length > 0 ? obstacles[obstacles.length - 1] : null;
            var lastX = lastObs ? lastObs.x : -400;

            if (WIDTH - lastX >= 420) {
                var isAir = Math.random() < 0.4;
                obstacles.push({
                    x: WIDTH,
                    y: isAir ? GROUND_Y - OBS_A_H - 80 : GROUND_Y - OBS_G_H,
                    w: isAir ? OBS_A_W : OBS_G_W,
                    h: isAir ? OBS_A_H : OBS_G_H,
                    type: isAir ? 'air' : 'ground'
                });
            }
        }

        // ---- 生成道具（血量越低概率越高） ----
        pickupTimer++;
        if (pickupTimer >= pickupInterval) {
            pickupTimer = 0;

            var lastP = pickups.length > 0 ? pickups[pickups.length - 1] : null;
            var lastPX = lastP ? lastP.x : -300;

            if (WIDTH - lastPX >= 350) {
                // 血量越低，回血道具出现概率越高
                var hpRatio = tank.hp / tank.maxHp;
                var spawnChance = hpRatio > 0.75 ? 0.35 : (hpRatio > 0.4 ? 0.55 : 0.75);
                if (Math.random() < spawnChance) {
                    pickups.push({
                        x: WIDTH,
                        y: GROUND_Y - PICKUP_H - 15,
                        w: PICKUP_W, h: PICKUP_H
                    });
                }
            }
        }

        // ---- 移动 ----
        for (var i = 0; i < obstacles.length; i++) obstacles[i].x -= gameSpeed;
        obstacles = obstacles.filter(function(o) { return o.x > -160; });
        for (var i = 0; i < pickups.length; i++) pickups[i].x -= gameSpeed;
        pickups = pickups.filter(function(p) { return p.x > -100; });

        // ---- 碰撞 ----
        var tr = { x: tank.x, y: tank.y, w: TANK_W, h: getTankHeight() };
        for (var i = 0; i < obstacles.length; i++) {
            if (rectCollide(tr, obstacles[i])) {
                if (tank.skillActive || tank.invincibleTimer > 0) continue;
                tank.hp -= 25;
                tank.invincibleTimer = tank.invincibleDuration;
                obstacles[i].x = -999;
                if (tank.hp <= 0) { tank.hp = 0; gameOver = true; }
            }
        }
        for (var i = 0; i < pickups.length; i++) {
            if (rectCollide(tr, pickups[i])) {
                if (tank.hp < tank.maxHp) tank.hp = Math.min(tank.maxHp, tank.hp + 25);
                pickups[i].x = -999;
            }
        }
        obstacles = obstacles.filter(function(o) { return o.x !== -999; });
        pickups = pickups.filter(function(p) { return p.x !== -999; });
    }

    // ==================== 绘制 ====================
    function drawBackground() {
        var bg = images['bg'];
        if (bg && bg.complete && bg.naturalWidth > 0) {
            ctx.drawImage(bg, 0, 0, WIDTH, HEIGHT);
        } else {
            var grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#0f3460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, GROUND_Y);
        }

        var g = images['ground'];
        if (g && g.complete && g.naturalWidth > 0) {
            ctx.drawImage(g, 0, GROUND_Y, WIDTH, GROUND_H);
        } else {
            var grad2 = ctx.createLinearGradient(0, GROUND_Y, 0, HEIGHT);
            grad2.addColorStop(0, '#3d2b1f');
            grad2.addColorStop(1, '#1a0f07');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, GROUND_Y, WIDTH, GROUND_H);
        }

        // 薄雾
        var fog = ctx.createLinearGradient(0, GROUND_Y - 200, 0, GROUND_Y);
        fog.addColorStop(0, 'rgba(255,255,255,0)');
        fog.addColorStop(1, 'rgba(255,255,255,0.03)');
        ctx.fillStyle = fog;
        ctx.fillRect(0, GROUND_Y - 200, WIDTH, 200);
    }

    function drawTank() {
        var img = getTankImage();
        var h = getTankHeight();
        tank.h = h;

        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(tank.x + TANK_W/2, GROUND_Y - 4, TANK_W/2.5, 5, 0, 0, Math.PI*2);
        ctx.fill();

        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, tank.x, tank.y, TANK_W, h);
        } else {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(tank.x, tank.y, TANK_W, h);
        }
    }

    function drawObstacles() {
        for (var i = 0; i < obstacles.length; i++) {
            var o = obstacles[i];
            var img = images[o.type === 'air' ? 'obstacle_air' : 'obstacle_ground'];
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.drawImage(img, o.x, o.y, o.w, o.h);
            } else {
                ctx.fillStyle = o.type === 'air' ? '#FF4444' : '#333';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }
        }
    }

    function drawPickups() {
        var img = images['weld_torch'];
        for (var i = 0; i < pickups.length; i++) {
            var p = pickups[i];
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.drawImage(img, p.x, p.y, PICKUP_W, PICKUP_H);
            } else {
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(p.x, p.y, PICKUP_W, PICKUP_H);
            }
            ctx.shadowBlur = 0;
        }
    }

    function roundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x, y + r);
        ctx.closePath();
    }

    function drawUI() {
        uiCtx.clearRect(0, 0, WIDTH, HEIGHT);

        // HP条
        var bx = 40, by = 35, bw = 380, bh = 36;
        uiCtx.fillStyle = 'rgba(0,0,0,0.5)';
        uiCtx.strokeStyle = 'rgba(255,255,255,0.3)';
        uiCtx.lineWidth = 2;
        roundedRect(uiCtx, bx, by, bw, bh, 12);
        uiCtx.fill();
        uiCtx.stroke();

        var r = tank.hp / tank.maxHp;
        var hpW = (bw - 6) * r;
        var hpColor = r > 0.5 ? '#4CAF50' : (r > 0.25 ? '#FF9800' : '#F44336');
        uiCtx.fillStyle = hpColor;
        roundedRect(uiCtx, bx+3, by+3, hpW, bh-6, 8);
        uiCtx.fill();

        uiCtx.fillStyle = '#fff';
        uiCtx.font = 'bold 22px "Segoe UI", "PingFang SC", sans-serif';
        uiCtx.textAlign = 'center';
        uiCtx.shadowColor = 'rgba(0,0,0,0.5)';
        uiCtx.shadowBlur = 4;
        uiCtx.fillText('HP  ' + tank.hp + ' / ' + tank.maxHp, bx + bw/2, by + 26);
        uiCtx.shadowBlur = 0;

        // 技能条
        var sx = 40, sy = 82, sw = 380, sh = 18;
        uiCtx.fillStyle = 'rgba(0,0,0,0.5)';
        uiCtx.strokeStyle = 'rgba(255,255,255,0.25)';
        uiCtx.lineWidth = 1.5;
        roundedRect(uiCtx, sx, sy, sw, sh, 8);
        uiCtx.fill();
        uiCtx.stroke();

        var skillText, skillColor, skillRatio;
        if (tank.skillActive) {
            skillColor = '#FFD700'; skillRatio = tank.skillTimer / tank.skillDuration;
            skillText = '主防开启';
        } else if (tank.skillCooldownTimer > 0) {
            skillColor = '#888'; skillRatio = tank.skillCooldownTimer / tank.skillCooldown;
            skillText = '冷却 ' + Math.ceil(tank.skillCooldownTimer / 60) + 's';
        } else {
            skillColor = '#4CAF50'; skillRatio = 1;
            skillText = '主防就绪 [Shift]';
        }
        uiCtx.fillStyle = skillColor;
        roundedRect(uiCtx, sx+2, sy+2, (sw-4)*skillRatio, sh-4, 6);
        uiCtx.fill();
        uiCtx.fillStyle = '#fff';
        uiCtx.font = 'bold 13px "Segoe UI", "PingFang SC", sans-serif';
        uiCtx.textAlign = 'center';
        uiCtx.fillText(skillText, sx + sw/2, sy + 13);

        // 分数
        uiCtx.fillStyle = '#fff';
        uiCtx.font = 'bold 56px "Segoe UI", "PingFang SC", sans-serif';
        uiCtx.textAlign = 'right';
        uiCtx.shadowColor = 'rgba(255,255,255,0.4)';
        uiCtx.shadowBlur = 20;
        uiCtx.fillText('' + Math.floor(score/10), WIDTH - 50, 80);
        uiCtx.shadowBlur = 0;

        if (gameOver) {
            uiCtx.fillStyle = 'rgba(0,0,0,0.75)';
            uiCtx.fillRect(0, HEIGHT/2 - 120, WIDTH, 240);
            uiCtx.fillStyle = '#fff';
            uiCtx.font = 'bold 64px "Segoe UI", "PingFang SC", sans-serif';
            uiCtx.textAlign = 'center';
            uiCtx.shadowColor = 'rgba(255,0,0,0.6)';
            uiCtx.shadowBlur = 30;
            uiCtx.fillText('坦克损毁', WIDTH/2, HEIGHT/2 - 15);
            uiCtx.shadowBlur = 0;
            uiCtx.fillStyle = '#ddd';
            uiCtx.font = '28px "Segoe UI", "PingFang SC", sans-serif';
            uiCtx.fillText('按空格 / 点击屏幕重新出发', WIDTH/2, HEIGHT/2 + 60);
        } else if (!gameStarted) {
            uiCtx.fillStyle = 'rgba(0,0,0,0.6)';
            uiCtx.fillRect(0, HEIGHT/2 - 120, WIDTH, 240);
            uiCtx.fillStyle = '#fff';
            uiCtx.font = 'bold 50px "Segoe UI", "PingFang SC", sans-serif';
            uiCtx.textAlign = 'center';
            uiCtx.fillText('轻 坦 快 跑', WIDTH/2, HEIGHT/2 - 25);
            uiCtx.fillStyle = '#ccc';
            uiCtx.font = '24px "Segoe UI", "PingFang SC", sans-serif';
            uiCtx.fillText('按空格 / 点击屏幕开始', WIDTH/2, HEIGHT/2 + 35);
            uiCtx.fillStyle = '#aaa';
            uiCtx.font = '18px "Segoe UI", "PingFang SC", sans-serif';
            uiCtx.fillText('跳跃: 空格/↑/W  |  下蹲: ↓/S  |  主防: Shift', WIDTH/2, HEIGHT/2 + 70);
        }
    }

    // ==================== 主循环 ====================
    function gameLoop() {
        update();
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        drawBackground();
        drawPickups();
        drawObstacles();
        drawTank();
        drawUI();
        requestAnimationFrame(gameLoop);
    }

    function restartGame() {
        tank.y = GROUND_Y - TANK_H;
        tank.targetY = GROUND_Y - TANK_H;
        tank.h = TANK_H;
        tank.vy = 0;
        tank.jumping = false;
        tank.crouching = false;
        tank.hp = tank.maxHp;
        tank.skillActive = false;
        tank.skillTimer = 0;
        tank.skillCooldownTimer = 0;
        tank.invincibleTimer = 0;
        obstacles = [];
        pickups = [];
        obstacleTimer = 0;
        pickupTimer = 0;
        frameCount = 0;
        score = 0;
        gameSpeed = 8;
        gameOver = false;
        gameStarted = false;
    }

    function startWhenReady() {
        if (loaded >= totalImages) {
            gameLoop();
        } else {
            setTimeout(startWhenReady, 200);
        }
    }
    startWhenReady();
})();
</script>
</body>
</html>
